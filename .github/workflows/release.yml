name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Verify tag matches plugin version
        run: |
          TAG="${GITHUB_REF_NAME#v}"
          VERSION="$(grep -m1 '^ \* Version:' meraki-builder.php | awk '{print $3}')"
          if [ "$TAG" != "$VERSION" ]; then
            echo "Tag v$TAG does not match plugin version $VERSION" >&2
            exit 1
          fi

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Build editor bundle
        run: |
          npm ci
          npm run build

      - name: Build zip
        run: bash scripts/build-zip.sh

      - name: Extract changelog section
        run: |
          TAG="${GITHUB_REF_NAME#v}"
          awk -v ver="$TAG" '
            /^## \[/ { in_section = ($0 ~ "\\[" ver "\\]") ; next }
            in_section { print }
          ' CHANGELOG.md > RELEASE_NOTES.md
          if [ ! -s RELEASE_NOTES.md ]; then
            echo "No CHANGELOG.md section found for $TAG" >&2
            exit 1
          fi

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "$GITHUB_REF_NAME" build/meraki-builder.zip \
            --title "Meraki Builder ${GITHUB_REF_NAME#v}" \
            --notes-file RELEASE_NOTES.md
